services:
  - type: web
    name: paraditi-mobility-platform
    env: docker
    plan: free # Use the free tier
    region: singapore # Closest to Bharat/India
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: prod-secret-key-hack2skill
      - key: JWT_SECRET_KEY
        value: prod-jwt-secret-key-hack2skill
      - key: USE_TFIDF
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: "/tmp/transformers_cache"
      - key: SIMILARITY_THRESHOLD
        value: "0.2"
