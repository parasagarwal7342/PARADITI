<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - P &Lambda; R &Lambda; D I T I (परादिति)</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <div class="logo-display-slot">
                    <img src="logo.png" alt="P Λ R Λ D I T I Logo" class="brand-logo-img">
                </div>
                <div class="brand-info">
                    <span class="brand-name">P &Lambda; R &Lambda; D I T I</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="active">Login</a>
                <a href="register.html">Register</a>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Login to P &Lambda; R &Lambda; D I T I</h2>
            <p class="auth-subtitle">Unlock limitless value today</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </div>

                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p class="footer-info">&copy; 2026 P &Lambda; R &Lambda; D I T I (परादिति). All rights reserved. |
                    Patent Pending: Claims A-U.</p>
                <div class="footer-founder">
                    Founder: <span class="founder-name">PARAS AGRAWAL</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
