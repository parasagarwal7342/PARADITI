version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=backend.app:create_app()
      - FLASK_ENV=production
      # Switch to Postgres when ready (uncomment below)
      # - DATABASE_URL=postgresql://sahaj:password@db:5432/sahaj_db
      # Use SQLite for now to match current state unless explicit migration
      - DATABASE_URL=sqlite:///instance/sahaj.db
      - REDIS_URL=redis://redis:6379/0
      - USE_TFIDF=1
      - SECRET_KEY=prod-secret-key-change-me
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./instance:/app/instance

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sahaj
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sahaj_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

# Professional Firewall Recommendation: 
